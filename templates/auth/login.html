{% extends 'base.html' %}
{% block title %}Logg inn · Bitleaf{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="hero-bl rounded-4 text-center mb-4 px-3 py-5">
      <h1 class="fs-2 mb-1" style="color:var(--bl-maroon);font-weight:800">Bitleaf</h1>
      <p class="mb-0" style="color:var(--bl-maroon);opacity:.8">Skap verdifulle relasjoner</p>
    </div>
    <div class="card p-4 text-center">
      <h2 class="fs-4 mb-1">Logg inn</h2>
      <p class="text-muted mb-4">Bli med i nettverket</p>
      <a href="{{ url_for('auth.google_login') }}" class="btn btn-light border d-flex align-items-center justify-content-center gap-2 py-2 mb-3">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.4 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.3 13 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.5-4.1 7-10.2 7-17.1z"/><path fill="#FBBC05" d="M10.5 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6L2.3 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.6 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.6 2.2-7.6 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/></svg>
        Fortsett med Google
      </a>
      <p class="text-muted small mt-3 mb-0">Ved å logge inn godtar du våre vilkår og personvernregler.</p>
    </div>
  </div>
</div>
{% endblock %}
